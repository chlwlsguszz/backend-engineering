services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: marketengine
      POSTGRES_USER: marketengine
      POSTGRES_PASSWORD: marketengine
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U marketengine -d marketengine"]
      interval: 5s
      timeout: 5s
      retries: 10
    volumes:
      - marketengine-pgdata:/var/lib/postgresql/data

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/marketengine
      SPRING_DATASOURCE_USERNAME: marketengine
      SPRING_DATASOURCE_PASSWORD: marketengine
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "8080:8080"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        BACKEND_ORIGIN: http://backend:8080
    environment:
      BACKEND_ORIGIN: http://backend:8080
    depends_on:
      - backend
    ports:
      - "3000:3000"

  prometheus:
    image: prom/prometheus:v3.6.0
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
    volumes:
      - ./observability/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    depends_on:
      - backend
    ports:
      - "9090:9090"

  grafana:
    image: grafana/grafana:12.1.0
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
    volumes:
      - ./observability/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./observability/grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana-data:/var/lib/grafana
    depends_on:
      - prometheus
    ports:
      - "3005:3000"

volumes:
  marketengine-pgdata:
  grafana-data:
